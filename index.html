<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Idea Platform · Screener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --surface:#f6f7f9; --card:#ffffff;
  --text:#0a0a0a; --text-muted:#6b7280; --border:#ececf0;
  --accent:#2563eb; --positive:#16a34a; --negative:#ef4444; --amber:#eab308;
  --radius:18px; --radius-lg:24px; --radius-pill:9999px;
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
  --font:"Inter",system-ui,sans-serif;
}
:root[data-theme="dark"] {
  --bg:#0a0b0d; --surface:#141518; --card:#1a1c20;
  --text:#f5f5f7; --text-muted:#9aa0a6; --border:#26282d;
  --accent:#3b82f6;
  --shadow:0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box;border-color:var(--border)}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--accent);text-decoration:none}
.money{font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* layout */
.shell{display:flex;min-height:100vh}
.sidebar{position:fixed;inset:0 auto 0 0;width:220px;background:var(--card);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;z-index:20}
.brand{font-size:19px;font-weight:800;letter-spacing:-.02em;padding:4px 12px 18px}
.brand span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:12px;border-radius:var(--radius);padding:10px 12px;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s ease;border:none;background:none;font-family:inherit;text-align:left;width:100%}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.on{background:var(--surface);color:var(--text);font-weight:600}
.nav-item svg{width:18px;height:18px;flex:none}
.nav-spacer{flex:1}
.theme-btn{display:flex;align-items:center;gap:12px;border-radius:var(--radius);padding:10px 12px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border:1px solid var(--border);background:none;font-family:inherit;transition:all .15s ease}
.theme-btn:hover{background:var(--surface);color:var(--text)}
.theme-btn svg{width:16px;height:16px;flex:none}
.content{flex:1;margin-left:220px;padding:24px 24px 90px;max-width:1400px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0}
.page-sub{font-size:12px;color:var(--text-muted);margin-top:4px;max-width:640px}

/* mobile */
.bottombar{display:none}
@media (max-width:860px){
  .sidebar{display:none}
  .content{margin-left:0;padding:18px 12px 90px}
  .bottombar{display:flex;position:fixed;bottom:0;left:0;right:0;background:color-mix(in srgb, var(--card) 95%, transparent);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:20}
  .bottombar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;font-size:10px;font-weight:600;color:var(--text-muted);background:none;border:none;font-family:inherit;cursor:pointer}
  .bottombar button.on{color:var(--accent)}
  .bottombar svg{width:20px;height:20px}
}

/* controls */
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.seg{display:flex;gap:4px;border-radius:12px;background:var(--surface);padding:3px}
.seg button{border-radius:9px;padding:6px 12px;font-size:12px;font-weight:500;color:var(--text-muted);background:none;border:none;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s ease}
.seg button.on{background:var(--card);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);font-weight:600}
.search{flex:1;min-width:160px;max-width:340px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);padding:9px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.search::placeholder{color:var(--text-muted)}
.search:focus{border-color:var(--accent)}
.count-chip{font-size:12px;font-weight:600;color:var(--text-muted);white-space:nowrap}

/* table */
.tbl{border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.trow{display:grid;grid-template-columns:var(--cols);gap:10px;align-items:center;padding:11px 16px}
.thead{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--border);z-index:5}
.th{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;white-space:nowrap}
.th:hover{color:var(--text)}
.th.num{justify-content:flex-end}
.th .arr{opacity:0;font-size:9px}
.th.act .arr{opacity:1}
.th.act{color:var(--text)}
.tbody .trow{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s ease}
.tbody .trow:last-child{border-bottom:none}
.tbody .trow:hover{background:var(--surface)}
.tbody .trow.sel{background:color-mix(in srgb, var(--accent) 8%, transparent)}
.cell-idea{min-width:0;display:flex;align-items:center;gap:11px}
.avatar{height:34px;width:34px;border-radius:10px;display:grid;place-items:center;font-size:11px;font-weight:700;flex:none}
.idea-main{min-width:0}
.idea-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.idea-sub{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cell-num{text-align:right;font-size:13px;font-weight:600}
.cell-num.mut{color:var(--text-muted);font-weight:500}
.st{display:inline-flex;align-items:center;gap:5px;border-radius:var(--radius-pill);padding:3px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.st .dt{width:6px;height:6px;border-radius:50%;flex:none}
.st.exists{background:#ef444418;color:var(--negative)}
.st.gap{background:#16a34a18;color:var(--positive)}
.st.unknown{background:var(--surface);color:var(--text-muted)}
.st.build{background:#16a34a18;color:var(--positive)}
.st.watch{background:#eab30822;color:var(--amber)}
.st.skip{background:#ef444418;color:var(--negative)}
.st.none{background:transparent;color:var(--text-muted);padding-left:0}
.pill{display:inline-flex;align-items:center;border-radius:var(--radius-pill);padding:2px 8px;font-size:11px;font-weight:600}
.pill.neutral{background:var(--surface);color:var(--text-muted)}

/* drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:30}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:460px;max-width:92vw;background:var(--bg);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:31;display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex:none}
.drawer-head .dtag{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted)}
.iconbtn{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;display:grid;place-items:center;font-size:15px;font-family:inherit}
.iconbtn:hover{color:var(--text)}
.drawer-body{padding:20px;overflow-y:auto;flex:1}
.detail-title{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0 0 10px;line-height:1.25}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.desc{font-size:14px;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;margin:14px 0 0}
.section-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);margin:22px 0 10px}
.setter{display:flex;gap:8px;flex-wrap:wrap}
.setter button{border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);color:var(--text-muted);padding:7px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .12s ease;display:inline-flex;align-items:center;gap:6px}
.setter button:hover{color:var(--text)}
.setter button.sel.exists{background:#ef444418;color:var(--negative);border-color:transparent}
.setter button.sel.gap{background:#16a34a18;color:var(--positive);border-color:transparent}
.setter button.sel.unknown{background:var(--card);color:var(--text);border-color:var(--border)}
.de-links{display:flex;gap:8px;flex-wrap:wrap}
.de-links a{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--surface);padding:7px 13px;font-size:12px;font-weight:600;color:var(--text)}
.de-links a:hover{border-color:var(--accent);color:var(--accent)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius);padding:10px 16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s ease;border:none;text-decoration:none}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{opacity:.9}
.btn.outline{border:1px solid var(--border);background:transparent;color:var(--text)}
.btn.outline:hover{background:var(--surface)}
.btn.good{background:var(--positive);color:#fff}
.btn.warn{background:var(--amber);color:#221a00}
.btn.bad{background:var(--negative);color:#fff}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

/* analyze */
.progress{height:4px;border-radius:2px;background:var(--surface);overflow:hidden;margin-bottom:6px}
.progress div{height:100%;background:var(--accent);transition:width .3s ease}
.timer{font-variant-numeric:tabular-nums;font-size:30px;font-weight:800;letter-spacing:-.02em;float:right;color:var(--accent)}
.timer.over{color:var(--negative)}
.qnum{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase}
.q-title{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px}
.q-hint{font-size:13px;color:var(--text-muted);margin-bottom:14px}
textarea{width:100%;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);padding:12px 14px;font-size:14px;font-family:inherit;min-height:92px;resize:vertical;outline:none}
textarea:focus{border-color:var(--accent)}
.vrow{display:flex;gap:10px;margin:12px 0}
.vrow .btn{flex:1;opacity:.4}
.vrow .btn.sel{opacity:1;outline:2px solid color-mix(in srgb, var(--text) 25%, transparent)}

/* stats */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{border-radius:var(--radius);border:1px solid var(--border);background:var(--card);padding:16px;box-shadow:var(--shadow)}
.kpi .l{font-size:12px;font-weight:500;color:var(--text-muted)}
.kpi .v{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.card{border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);border:1px solid var(--border);padding:20px}
.vbar{display:flex;height:10px;border-radius:var(--radius-pill);overflow:hidden;background:var(--surface)}
.legend{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--text-muted);flex-wrap:wrap}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}

/* states */
.empty{text-align:center;padding:64px 0}
.empty .t{font-size:14px;font-weight:600}
.empty .h{font-size:12px;color:var(--text-muted);margin-top:4px}
.spinner{height:24px;width:24px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:64px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--positive);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:60;box-shadow:var(--shadow)}
.toast.show{opacity:1}

/* hide columns on narrow */
@media (max-width:640px){
  .col-age{display:none}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">idea<span>·</span>platform</div>
    <button class="nav-item" id="nav-screener" onclick="go('screener')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Screener</button>
    <button class="nav-item" id="nav-stats" onclick="go('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      Training Stats</button>
    <button class="nav-item" id="nav-tv" onclick="go('tv')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="m17 2-5 5-5-5"/></svg>
      TV Archive</button>
    <div class="nav-spacer"></div>
    <button class="theme-btn" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="theme-label">Dark mode</span></button>
  </aside>

  <main class="content"><div id="main"><div class="spinner"></div></div></main>
</div>

<nav class="bottombar">
  <button id="bnav-screener" onclick="go('screener')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
    Screener</button>
  <button id="bnav-stats" onclick="go('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Stats</button>
  <button id="bnav-tv" onclick="go('tv')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="m17 2-5 5-5-5"/></svg>
    TV</button>
</nav>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div id="drawer-inner"></div></aside>

<div class="toast" id="toast"></div>

<script>
var SB_URL = "https://uyeefonkkkqkybeoelpz.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5ZWVmb25ra2txa3liZW9lbHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjA5MTEsImV4cCI6MjA5ODYzNjkxMX0.HUJHWr0UrmnXc0By_seAs6O_rtytLWxiFF8-MJiZRQg";

var US_LANE = ['hn-show','producthunt','techcrunch'];
var DE_LANE = ['deutsche-startups','eu-startups'];
var SRC_COLOR = {'hn-show':'#f97316','producthunt':'#ec4899','techcrunch':'#16a34a','deutsche-startups':'#a855f7','eu-startups':'#06b6d4'};
var SRC_SHORT = {'hn-show':'HN','producthunt':'PH','techcrunch':'TC','deutsche-startups':'DS','eu-startups':'EU'};
var TV_SHOWS = {shark_tank_us:{name:'Shark Tank',flag:'🇺🇸',short:'ST',color:'#2563eb'}, dragons_den_uk:{name:"Dragons' Den",flag:'🇬🇧',short:'DD',color:'#dc2626'}, dhdl_de:{name:'Höhle der Löwen',flag:'🇩🇪',short:'DHDL',color:'#16a34a'}};

var COLS = '2.4fr .8fr .55fr 1fr .9fr';

var state = {view:'screener', ideas:[], sources:[], analyses:[], loaded:false,
  lane:'us', src:'all', unanalyzed:false, q:'',
  sortKey:'age', sortDir:'desc', current:null, run:null, deColSupported:true,
  tv:[], tvLoaded:false, tvShow:'all', tvCat:'all', tvYear:'all', tvQ:'', tvSortKey:'air_date', tvSortDir:'desc', tvCurrent:null};

var STEPS = [
  {key:'problem', title:'Problem', hint:'Who hurts, and how badly?', sec:30},
  {key:'who_pays', title:'Who pays', hint:'Customer vs user - who has willingness to pay?', sec:30},
  {key:'why_now', title:'Why now', hint:'What changed? Tech, regulation, or behavior.', sec:30},
  {key:'market_size', title:'Market size', hint:'Order-of-magnitude estimate. Niche, mid, or huge?', sec:30},
  {key:'moat', title:'Moat', hint:'What stops copycats in 6 months?', sec:30},
  {key:'dach_fit', title:'Germany fit', hint:'Does it exist in DE already? Check the links below. Language barrier as YOUR edge? Localization cost?', sec:60},
  {key:'verdict', title:'Verdict', hint:'Build, watch, or skip - plus a one-line reason.', sec:15}
];

/* ---------- helpers ---------- */
function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json'}, opts.headers||{});
  return fetch(SB_URL+path, opts).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('API '+r.status+' '+t.slice(0,120)); });
    return r.status===204?null:r.json();
  });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function timeAgo(iso){
  if(!iso) return '';
  var d=(Date.now()-new Date(iso).getTime())/1000;
  if(d<3600) return Math.max(1,Math.round(d/60))+'m';
  if(d<86400) return Math.round(d/3600)+'h';
  return Math.round(d/86400)+'d';
}
function tScore(i){ var t=i.traction||{}; return (t.upvotes||0)+(t.comments||0); }
function slug(i){ return i.sources?i.sources.slug:''; }
function laneOf(i){ return US_LANE.indexOf(slug(i))>=0?'us':(DE_LANE.indexOf(slug(i))>=0?'de':''); }
function toast(msg,bad){
  var t=document.getElementById('toast'); t.textContent=msg;
  t.style.background=bad?'var(--negative)':'var(--positive)';
  t.className='toast show'; setTimeout(function(){t.className='toast';},2600);
}
function toggleTheme(){
  var h=document.documentElement;
  var next=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',next);
  try{localStorage.setItem('ip-theme',next);}catch(e){}
  var l=document.getElementById('theme-label'); if(l) l.textContent = next==='dark'?'Light mode':'Dark mode';
}
(function(){
  var saved=null; try{saved=localStorage.getItem('ip-theme');}catch(e){}
  if(saved){ document.documentElement.setAttribute('data-theme',saved); }
  window.addEventListener('DOMContentLoaded',function(){
    var l=document.getElementById('theme-label');
    if(l) l.textContent = document.documentElement.getAttribute('data-theme')==='dark'?'Light mode':'Dark mode';
  });
})();
function go(v){
  state.view=v; closeDrawer(); render(); window.scrollTo(0,0);
}
function analysisFor(id){ return state.analyses.find(function(a){return a.idea_id===id;}); }

/* ---------- data ---------- */
function load(){
  Promise.all([
    api('/rest/v1/sources?select=id,slug,name&order=name'),
    api('/rest/v1/ideas?select=*,sources(slug,name)&order=published_at.desc.nullslast&limit=500'),
    api('/rest/v1/idea_analyses?select=idea_id,verdict,duration_seconds,created_at&order=created_at.desc&limit=1000')
  ]).then(function(res){
    state.sources=res[0]; state.ideas=res[1]; state.analyses=res[2];
    state.deColSupported = res[1].length ? ('de_status' in res[1][0]) : true;
    state.loaded=true; render();
  }).catch(function(e){
    document.getElementById('main').innerHTML='<div class="empty"><div class="t">Failed to load</div><div class="h">'+esc(e.message)+' - try reloading</div></div>';
  });
}

/* ---------- filtering / sorting ---------- */
var DE_ORD={gap:2,exists:1,unknown:0}, V_ORD={build:3,watch:2,skip:1};
function deStatus(i){ return i.de_status||'unknown'; }
function verdictOf(i){ var a=analysisFor(i.id); return a?a.verdict:null; }
function screenIdeas(){
  var q=state.q.toLowerCase();
  var list=state.ideas.filter(function(i){
    var ln=laneOf(i);
    if(state.lane==='us'&&ln!=='us') return false;
    if(state.lane==='de'&&ln!=='de') return false;
    if(state.src!=='all'&&slug(i)!==state.src) return false;
    if(state.unanalyzed&&analysisFor(i.id)) return false;
    if(q && !((i.title||'')+' '+(i.description||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  var k=state.sortKey, dir=state.sortDir==='asc'?1:-1;
  list.sort(function(a,b){
    var av,bv;
    if(k==='age'){ av=a.published_at?new Date(a.published_at).getTime():0; bv=b.published_at?new Date(b.published_at).getTime():0; }
    else if(k==='traction'){ av=tScore(a); bv=tScore(b); }
    else if(k==='de'){ av=DE_ORD[deStatus(a)]||0; bv=DE_ORD[deStatus(b)]||0; }
    else if(k==='verdict'){ av=V_ORD[verdictOf(a)]||0; bv=V_ORD[verdictOf(b)]||0; }
    else if(k==='idea'){ av=(a.title||'').toLowerCase(); bv=(b.title||'').toLowerCase(); return av<bv?-1*dir:av>bv?1*dir:0; }
    return (av-bv)*dir;
  });
  return list;
}
function setSort(k){
  if(state.sortKey===k){ state.sortDir=state.sortDir==='asc'?'desc':'asc'; }
  else { state.sortKey=k; state.sortDir=(k==='idea')?'asc':'desc'; }
  render();
}

/* ---------- render ---------- */

  });
  var m=document.getElementById('main');
  if(!state.loaded){ m.innerHTML='<div class="spinner"></div>'; return; }
  if(state.view==='stats') m.innerHTML=statsHtml();
  else if(state.view==='tv'){ if(!state.tvLoaded){ m.innerHTML='<div class="spinner"></div>'; loadTv(); } else m.innerHTML=tvHtml(); }

/* ---------- analyze ---------- */
function startRun(){
  state.run={step:0, notes:{}, verdict:null, stepStart:Date.now(), runStart:Date.now(), perStep:{}, timerId:null};
  renderDrawer();
}
function analyzeHtml(){
  var r=state.run, s=STEPS[r.step], i=state.current;
  var pct=Math.round(r.step/STEPS.length*100);
  var h='<div class="drawer-head"><span class="dtag">⏱ Analyzing · '+esc(i.title.slice(0,32))+'</span>'
    +'<button class="iconbtn" onclick="abortRun()">✕</button></div>'
    +'<div class="drawer-body">'
    +'<div class="progress"><div style="width:'+pct+'%"></div></div>'
    +'<div><span class="timer" id="timer">'+s.sec+'s</span>'
    +'<div class="qnum">Step '+(r.step+1)+' / '+STEPS.length+' · target '+s.sec+'s</div>'
    +'<h3 class="q-title">'+s.title+'</h3><div class="q-hint">'+s.hint+'</div></div>';
  if(s.key==='verdict'){
    h+='<div class="vrow">'
      +'<button class="btn good'+(r.verdict==='build'?' sel':'')+'" onclick="setV(\'build\')">BUILD</button>'
      +'<button class="btn warn'+(r.verdict==='watch'?' sel':'')+'" onclick="setV(\'watch\')">WATCH</button>'
      +'<button class="btn bad'+(r.verdict==='skip'?' sel':'')+'" onclick="setV(\'skip\')">SKIP</button></div>'
      +'<textarea id="note" placeholder="One-line reason…">'+esc(r.notes.verdict_reason||'')+'</textarea>'
      +'<div class="btnrow"><button class="btn primary" style="flex:1" onclick="nextStep()">Save analysis ✓</button></div>';
  } else {
    h+='<textarea id="note" placeholder="Your quick take…">'+esc(r.notes[s.key]||'')+'</textarea>';
    if(s.key==='dach_fit'){
      var ds=deStatus(i);
      h+='<div class="setter" style="margin-top:12px">'
        +'<button class="exists'+(ds==='exists'?' sel':'')+'" onclick="setDe(\'exists\')">● Exists</button>'
        +'<button class="gap'+(ds==='gap'?' sel':'')+'" onclick="setDe(\'gap\')">● Gap</button>'
        +'<button class="unknown'+(ds==='unknown'?' sel':'')+'" onclick="setDe(\'unknown\')">○ Unknown</button>'
        +'</div>';
    }
    h+='<div class="btnrow"><button class="btn primary" style="flex:1" onclick="nextStep()">Next →</button></div>';
  }
  if(s.key==='dach_fit'){ h+=deLinks(i); }
  h+='</div>';
  return h;
}
function bindStep(){
  var r=state.run; if(!r) return;
  if(r.timerId) clearInterval(r.timerId);
  r.timerId=setInterval(function(){
    var el=document.getElementById('timer'); if(!el){clearInterval(r.timerId);return;}
    var elapsed=Math.round((Date.now()-r.stepStart)/1000);
    var left=STEPS[r.step].sec-elapsed;
    el.textContent=(left>=0?left:'+'+(-left))+'s';
    el.className=left<0?'timer over':'timer';
  },250);
  var n=document.getElementById('note'); if(n) n.focus();
}
function setV(v){ state.run.verdict=v; saveNote(); renderDrawer(); }
function saveNote(){
  var r=state.run; if(!r) return;
  var s=STEPS[r.step], n=document.getElementById('note');
  if(n){ if(s.key==='verdict') r.notes.verdict_reason=n.value; else r.notes[s.key]=n.value; }
}
function nextStep(){
  var r=state.run, s=STEPS[r.step];
  saveNote();
  r.perStep[s.key]=Math.round((Date.now()-r.stepStart)/1000);
  if(s.key==='verdict'){
    if(!r.verdict){ toast('Pick build / watch / skip', true); return; }
    finishRun(); return;
  }
  r.step++; r.stepStart=Date.now(); renderDrawer();
}
function abortRun(){
  if(state.run&&state.run.timerId) clearInterval(state.run.timerId);
  state.run=null; renderDrawer();
}
function finishRun(){
  var r=state.run;
  clearInterval(r.timerId);
  var payload={idea_id:state.current.id, verdict:r.verdict, duration_seconds:Math.round((Date.now()-r.runStart)/1000),
    notes:Object.assign({}, r.notes, {per_step_seconds:r.perStep})};
  api('/rest/v1/idea_analyses',{method:'POST',body:JSON.stringify(payload),headers:{Prefer:'return=representation'}})
    .then(function(rows){
      state.analyses.unshift(rows[0]);
      toast('Saved: '+r.verdict.toUpperCase()+' in '+payload.duration_seconds+'s');
      state.run=null; renderDrawer(); render();
    })
    .catch(function(e){ toast('Save failed: '+e.message, true); });
}

var TV_COLS='2.2fr 1.1fr .9fr .7fr .55fr .8fr';

  var q=state.tvQ.toLowerCase();

    if(state.tvShow!=='all'&&p.show!==state.tvShow) return false;
    if(state.tvCat!=='all'&&(p.category||'')!==state.tvCat) return false;
    if(state.tvYear!=='all'&&tvYearOf(p)!==state.tvYear) return false;
    if(q && !((p.company||'')+' '+(p.description||'')+' '+(p.category||'')).toLowerCase().includes(q)) return false;
    return true;
  });
  var k=state.tvSortKey, dir=state.tvSortDir==='asc'?1:-1;

    if(k==='category'){ av=(a.category||'').toLowerCase(); bv=(b.category||'').toLowerCase(); return av<bv?-1*dir:av>bv?1*dir:0; }

function tvDeLinks(p){
  var t=encodeURIComponent(p.company||'');
  return '<div class="section-label">\U0001F1E9\U0001F1EA Does this exist in Germany?</div><div class="de-links">'
    +'<a target="_blank" rel="noopener" href="https://www.google.de/search?q='+t+'+Deutschland">Google.de: name + Deutschland</a>'
    +'<a target="_blank" rel="noopener" href="https://www.google.de/search?q='+t+'+deutsche+alternative">Google.de: deutsche Alternative</a>'
    +'<a target="_blank" rel="noopener" href="https://www.deutsche-startups.de/?s='+t+'">deutsche-startups.de</a>'
    +'<a target="_blank" rel="noopener" href="https://www.eu-startups.com/?s='+t+'">eu-startups.com</a>'
    +'</div>';
}
function renderTvDrawer(){
  var p=state.tvCurrent; if(!p) return;
  var sh=TV_SHOWS[p.show]||{name:'',flag:'',color:'#3b82f6'};
  var se=(p.season?'Season '+p.season:'')+(p.episode?' · Ep '+p.episode:'');
  var v=p.verdict;
  var h='<div class="drawer-head"><span class="dtag">'+sh.flag+' '+esc(sh.name)+(se?' · '+esc(se):'')+'</span>'
    +'<button class="iconbtn" onclick="closeDrawer()">✕</button></div>'
    +'<div class="drawer-body">'
    +'<h2 class="detail-title">'+esc(p.company)+'</h2>'
    +'<div class="meta">'
    +(p.category?'<span class="pill neutral">'+esc(p.category)+'</span>':'')
    +(p.air_date?'<span>'+esc(p.air_date)+'</span>':'')
    +(p.status_today?'<span class="pill neutral">'+esc(p.status_today)+'</span>':'')
    +'</div>'
    +(p.description?'<p class="desc">'+esc(p.description)+'</p>':'')
    +'<div class="btnrow">'
    +(p.source_url?'<a class="btn outline" href="'+esc(p.source_url)+'" target="_blank" rel="noopener">Source ↗</a>':'')
    +(p.website?'<a class="btn outline" href="'+esc(p.website)+'" target="_blank" rel="noopener">Website ↗</a>':'')
    +'</div>'
    +'<div class="section-label">Your verdict</div>'
    +'<div class="setter">'
    +'<button class="gap'+(v==='build'?' sel':'')+'" onclick="tvSetV(\'build\')">● Build</button>'
    +'<button class="unknown'+(v==='watch'?' sel':'')+'" onclick="tvSetV(\'watch\')">● Watch</button>'
    +'<button class="exists'+(v==='skip'?' sel':'')+'" onclick="tvSetV(\'skip\')">● Skip</button>'
    +'</div>'
    +tvDeLinks(p)
    +'</div>';
  document.getElementById('drawer-inner').innerHTML=h;
}
function tvSetV(v){
  var p=state.tvCurrent; if(!p) return;
  var prev=p.verdict; p.verdict=(p.verdict===v?null:v);
  renderTvDrawer(); render();
  api('/rest/v1/tv_pitches?id=eq.'+p.id,{method:'PATCH',body:JSON.stringify({verdict:p.verdict})})
    .then(function(){ toast('Verdict: '+(p.verdict||'cleared')); })
    .catch(function(e){ p.verdict=prev; renderTvDrawer(); render(); toast('Save failed: '+e.message,true); });
}

/* ---------- stats ---------- */
function statsHtml(){
  var a=state.analyses;
  var h='<div class="page-head"><div><h1 class="page-title">Training Stats</h1>'
    +'<div class="page-sub">Target: 4.5 min per idea. Faster with practice — that is the training.</div></div></div>';
  if(!a.length) return h+'<div class="card"><div class="empty"><div class="t">No analyses yet</div><div class="h">Open an idea in the Screener and hit Analyze</div></div></div>';
  var avg=Math.round(a.reduce(function(s,x){return s+(x.duration_seconds||0);},0)/a.length);
  var counts={build:0,watch:0,skip:0};
  a.forEach(function(x){ if(counts[x.verdict]!=null) counts[x.verdict]++; });
  var today=new Date().toDateString();
  var todayN=a.filter(function(x){return new Date(x.created_at).toDateString()===today;}).length;
  var tot=counts.build+counts.watch+counts.skip||1;
  // DE-status distribution across all ideas
  var de={gap:0,exists:0,unknown:0};
  state.ideas.forEach(function(i){ var d=deStatus(i); if(de[d]!=null) de[d]++; });
  h+='<div class="kpis">'
    +'<div class="kpi"><div class="l">Total analyses</div><div class="v money">'+a.length+'</div></div>'
    +'<div class="kpi"><div class="l">Today</div><div class="v money">'+todayN+'</div></div>'
    +'<div class="kpi"><div class="l">Avg time</div><div class="v money">'+Math.floor(avg/60)+':'+('0'+avg%60).slice(-2)+'</div></div>'
    +'<div class="kpi"><div class="l">Build rate</div><div class="v money" style="color:var(--positive)">'+Math.round(counts.build/tot*100)+'%</div></div>'
    +'<div class="kpi"><div class="l">🇩🇪 Gaps found</div><div class="v money" style="color:var(--positive)">'+de.gap+'</div></div>'
    +'</div>'
    +'<div class="card" style="margin-top:16px"><div class="section-label" style="margin-top:0">Verdicts</div>'
    +'<div class="vbar">'
    +'<div style="width:'+(counts.build/tot*100)+'%;background:var(--positive)"></div>'
    +'<div style="width:'+(counts.watch/tot*100)+'%;background:var(--amber)"></div>'
    +'<div style="width:'+(counts.skip/tot*100)+'%;background:var(--negative)"></div></div>'
    +'<div class="legend">'
    +'<span><span class="dot" style="background:var(--positive)"></span>build '+counts.build+'</span>'
    +'<span><span class="dot" style="background:var(--amber)"></span>watch '+counts.watch+'</span>'
    +'<span><span class="dot" style="background:var(--negative)"></span>skip '+counts.skip+'</span>'
    +'</div></div>';
  return h;
}

/* keyboard: Esc closes drawer */
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeDrawer(); });

load(); render();
</script>
</body>
</html>
