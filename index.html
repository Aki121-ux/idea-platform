<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Idea Platform</title>
<style>
:root{--bg:#0f1115;--panel:#181b22;--panel2:#1f232d;--border:#2a2f3a;--text:#e8eaf0;--dim:#8b93a5;--accent:#5b8cff;--green:#3fb970;--amber:#e0a83e;--red:#e05252}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5}
a{color:var(--accent);text-decoration:none}
header{position:sticky;top:0;background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;z-index:10}
header h1{font-size:17px;font-weight:700;letter-spacing:.3px;cursor:pointer}
header h1 span{color:var(--accent)}
nav{display:flex;gap:4px;margin-left:auto}
nav button{background:none;border:none;color:var(--dim);font-size:14px;padding:6px 12px;border-radius:8px;cursor:pointer}
nav button.on{background:var(--panel2);color:var(--text)}
main{max-width:860px;margin:0 auto;padding:20px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.bar select,.bar input{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:14px}
.bar input{flex:1;min-width:140px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.card p{font-size:13px;color:var(--dim);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--dim)}
.badge{background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--dim)}
.badge.src{color:var(--accent);border-color:#33406a}
.badge.done{color:var(--green);border-color:#2a4a38}
.badge.v-build{color:var(--green)}.badge.v-watch{color:var(--amber)}.badge.v-skip{color:var(--red)}
.tr{color:var(--amber)}
.empty{color:var(--dim);text-align:center;padding:60px 0}
.detail h2{font-size:20px;margin-bottom:10px}
.detail .desc{color:var(--dim);font-size:14px;margin:14px 0;white-space:pre-wrap}
.btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer}
.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn.green{background:var(--green)}.btn.amber{background:var(--amber);color:#1a1500}.btn.red{background:var(--red)}
.btnrow{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.back{color:var(--dim);font-size:13px;cursor:pointer;margin-bottom:14px;display:inline-block}
.an-step{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px}
.an-step .qnum{font-size:12px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.an-step h3{font-size:18px;margin:6px 0 2px}
.an-step .hint{font-size:13px;color:var(--dim);margin-bottom:14px}
.timer{font-variant-numeric:tabular-nums;font-size:28px;font-weight:700;float:right}
.timer.over{color:var(--red)}
textarea{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px;font-size:14px;font-family:inherit;min-height:90px;resize:vertical}
.vrow{display:flex;gap:10px;margin:12px 0}
.vrow .btn{flex:1;opacity:.45}
.vrow .btn.sel{opacity:1;outline:2px solid #fff3}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat .n{font-size:26px;font-weight:700}
.stat .l{font-size:12px;color:var(--dim)}
.progress{height:4px;background:var(--panel2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress div{height:100%;background:var(--accent);transition:width .3s}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <h1 onclick="go('feed')">idea<span>·platform</span></h1>
  <nav>
    <button id="nav-feed" onclick="go('feed')">Feed</button>
    <button id="nav-stats" onclick="go('stats')">Stats</button>
  </nav>
</header>
<main id="main"><div class="empty">Loading ideas…</div></main>
<div class="toast" id="toast"></div>
<script>
var SB_URL = "https://uyeefonkkkqkybeoelpz.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5ZWVmb25ra2txa3liZW9lbHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjA5MTEsImV4cCI6MjA5ODYzNjkxMX0.HUJHWr0UrmnXc0By_seAs6O_rtytLWxiFF8-MJiZRQg";
var state = {view:'feed', ideas:[], sources:[], analyses:[], src:'all', sort:'new', q:'', current:null,
  run:null};

var STEPS = [
  {key:'problem', title:'Problem', hint:'Who hurts, and how badly?', sec:30},
  {key:'who_pays', title:'Who pays', hint:'Customer vs user - who has willingness to pay?', sec:30},
  {key:'why_now', title:'Why now', hint:'What changed? Tech, regulation, or behavior.', sec:30},
  {key:'market_size', title:'Market size', hint:'Order-of-magnitude estimate. Niche, mid, or huge?', sec:30},
  {key:'moat', title:'Moat', hint:'What stops copycats in 6 months?', sec:30},
  {key:'dach_fit', title:'Germany / DACH fit', hint:'Does it exist in DE already? Language barrier as edge? Localization cost?', sec:60},
  {key:'verdict', title:'Verdict', hint:'Build, watch, or skip - plus a one-line reason.', sec:15}
];

function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json'}, opts.headers||{});
  return fetch(SB_URL+path, opts).then(function(r){
    if(!r.ok) throw new Error('API '+r.status);
    return r.status===204?null:r.json();
  });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function timeAgo(iso){
  if(!iso) return '';
  var d = (Date.now()-new Date(iso).getTime())/1000;
  if(d<3600) return Math.max(1,Math.round(d/60))+'m ago';
  if(d<86400) return Math.round(d/3600)+'h ago';
  return Math.round(d/86400)+'d ago';
}
function tScore(i){ var t=i.traction||{}; return (t.upvotes||0)+(t.comments||0); }
function toast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show';
  setTimeout(function(){t.className='toast';},2200);
}
function go(v){ state.view=v; if(v!=='detail'&&v!=='analyze'){state.current=null;} render(); window.scrollTo(0,0); }

function load(){
  Promise.all([
    api('/rest/v1/sources?select=id,slug,name&order=name'),
    api('/rest/v1/ideas?select=*,sources(slug,name)&order=published_at.desc.nullslast&limit=400'),
    api('/rest/v1/idea_analyses?select=idea_id,verdict,duration_seconds,created_at&order=created_at.desc&limit=500')
  ]).then(function(res){
    state.sources=res[0]; state.ideas=res[1]; state.analyses=res[2]; render();
  }).catch(function(e){
    document.getElementById('main').innerHTML='<div class="empty">Failed to load: '+esc(e.message)+'</div>';
  });
}
function analysisFor(id){ return state.analyses.find(function(a){return a.idea_id===id;}); }

function render(){
  document.getElementById('nav-feed').className = state.view==='feed'||state.view==='detail'||state.view==='analyze' ? 'on':'';
  document.getElementById('nav-stats').className = state.view==='stats'?'on':'';
  var m=document.getElementById('main');
  if(state.view==='feed') m.innerHTML=feedHtml();
  else if(state.view==='detail') m.innerHTML=detailHtml();
  else if(state.view==='analyze') m.innerHTML=analyzeHtml();
  else if(state.view==='stats') m.innerHTML=statsHtml();
  if(state.view==='analyze') bindStep();
}

function feedHtml(){
  var opts='<option value="all">All sources</option>';
  state.sources.forEach(function(s){ opts+='<option value="'+s.slug+'"'+(state.src===s.slug?' selected':'')+'>'+esc(s.name)+'</option>'; });
  var h='<div class="bar">'
    +'<select onchange="state.src=this.value;render()">'+opts+'</select>'
    +'<select onchange="state.sort=this.value;render()">'
    +'<option value="new"'+(state.sort==='new'?' selected':'')+'>Newest</option>'
    +'<option value="traction"'+(state.sort==='traction'?' selected':'')+'>Traction</option></select>'
    +'<input placeholder="Search…" value="'+esc(state.q)+'" oninput="state.q=this.value;render()">'
    +'</div>';
  var list=state.ideas.filter(function(i){
    if(state.src!=='all' && (!i.sources||i.sources.slug!==state.src)) return false;
    if(state.q){ var q=state.q.toLowerCase(); if(!((i.title||'')+' '+(i.description||'')).toLowerCase().includes(q)) return false; }
    return true;
  });
  if(state.sort==='traction') list=list.slice().sort(function(a,b){return tScore(b)-tScore(a);});
  if(!list.length) return h+'<div class="empty">No ideas match.</div>';
  list.forEach(function(i){
    var an=analysisFor(i.id);
    h+='<div class="card" onclick="openIdea('+i.id+')"><h3>'+esc(i.title)+'</h3>'
      +(i.description?'<p>'+esc(i.description)+'</p>':'')
      +'<div class="meta"><span class="badge src">'+esc(i.sources?i.sources.name:'')+'</span>'
      +(tScore(i)>0?'<span class="tr">▲ '+(i.traction.upvotes||0)+' · 💬 '+(i.traction.comments||0)+'</span>':'')
      +(an?'<span class="badge done">analyzed · '+an.verdict+'</span>':'')
      +'<span>'+timeAgo(i.published_at)+'</span></div></div>';
  });
  return h;
}
function openIdea(id){ state.current=state.ideas.find(function(i){return i.id===id;}); go('detail'); }

function detailHtml(){
  var i=state.current; if(!i) return feedHtml();
  var an=analysisFor(i.id);
  return '<span class="back" onclick="go(\'feed\')">← back to feed</span>'
    +'<div class="detail"><h2>'+esc(i.title)+'</h2>'
    +'<div class="meta"><span class="badge src">'+esc(i.sources?i.sources.name:'')+'</span>'
    +(tScore(i)>0?'<span class="tr">▲ '+(i.traction.upvotes||0)+' · 💬 '+(i.traction.comments||0)+'</span>':'')
    +'<span>'+timeAgo(i.published_at)+'</span>'
    +(i.tags&&i.tags.length?i.tags.map(function(t){return '<span class="badge">'+esc(t)+'</span>';}).join(''):'')
    +'</div>'
    +(i.description?'<div class="desc">'+esc(i.description)+'</div>':'<div class="desc">(no description - open the link)</div>')
    +'<div class="btnrow">'
    +(i.url?'<a class="btn ghost" href="'+esc(i.url)+'" target="_blank" rel="noopener">Open link ↗</a>':'')
    +(i.traction&&i.traction.hn_url?'<a class="btn ghost" href="'+esc(i.traction.hn_url)+'" target="_blank" rel="noopener">HN thread ↗</a>':'')
    +(an?'<span class="badge done" style="align-self:center">already analyzed: '+an.verdict+'</span>':'')
    +'<button class="btn" onclick="startRun()">'+(an?'Analyze again':'Analyze')+' ⏱</button>'
    +'</div></div>';
}

function startRun(){
  state.run={step:0, notes:{}, verdict:null, stepStart:Date.now(), runStart:Date.now(), perStep:{}, left:STEPS[0].sec, timerId:null};
  go('analyze');
}
function analyzeHtml(){
  var r=state.run, s=STEPS[r.step], i=state.current;
  var pct=Math.round(r.step/STEPS.length*100);
  var h='<span class="back" onclick="abortRun()">✕ abort analysis</span>'
    +'<div class="progress"><div style="width:'+pct+'%"></div></div>'
    +'<div style="font-size:13px;color:var(--dim);margin-bottom:10px">'+esc(i.title)+'</div>'
    +'<div class="an-step"><span class="timer" id="timer">'+r.left+'s</span>'
    +'<div class="qnum">Step '+(r.step+1)+' / '+STEPS.length+' · target '+s.sec+'s</div>'
    +'<h3>'+s.title+'</h3><div class="hint">'+s.hint+'</div>';
  if(s.key==='verdict'){
    h+='<div class="vrow">'
      +'<button class="btn green'+(r.verdict==='build'?' sel':'')+'" onclick="setV(\'build\')">BUILD</button>'
      +'<button class="btn amber'+(r.verdict==='watch'?' sel':'')+'" onclick="setV(\'watch\')">WATCH</button>'
      +'<button class="btn red'+(r.verdict==='skip'?' sel':'')+'" onclick="setV(\'skip\')">SKIP</button></div>'
      +'<textarea id="note" placeholder="One-line reason…">'+esc(r.notes.verdict_reason||'')+'</textarea>'
      +'<div class="btnrow"><button class="btn" onclick="nextStep()">Save analysis ✓</button></div>';
  } else {
    h+='<textarea id="note" placeholder="Your quick take…">'+esc(r.notes[s.key]||'')+'</textarea>'
      +'<div class="btnrow"><button class="btn" onclick="nextStep()">Next →</button></div>';
  }
  return h+'</div>';
}
function bindStep(){
  var r=state.run;
  if(r.timerId) clearInterval(r.timerId);
  r.timerId=setInterval(function(){
    var el=document.getElementById('timer'); if(!el){clearInterval(r.timerId);return;}
    var elapsed=Math.round((Date.now()-r.stepStart)/1000);
    var left=STEPS[r.step].sec-elapsed;
    el.textContent=(left>=0?left:'+'+(-left))+'s';
    el.className=left<0?'timer over':'timer';
  },250);
  var n=document.getElementById('note'); if(n) n.focus();
}
function setV(v){ state.run.verdict=v; saveNote(); render(); }
function saveNote(){
  var r=state.run, s=STEPS[r.step], n=document.getElementById('note');
  if(n){ if(s.key==='verdict') r.notes.verdict_reason=n.value; else r.notes[s.key]=n.value; }
}
function nextStep(){
  var r=state.run, s=STEPS[r.step];
  saveNote();
  r.perStep[s.key]=Math.round((Date.now()-r.stepStart)/1000);
  if(s.key==='verdict'){
    if(!r.verdict){ toast('Pick build / watch / skip'); return; }
    finishRun(); return;
  }
  r.step++; r.stepStart=Date.now(); r.left=STEPS[r.step].sec; render();
}
function abortRun(){
  if(state.run&&state.run.timerId) clearInterval(state.run.timerId);
  state.run=null; go('detail');
}
function finishRun(){
  var r=state.run;
  clearInterval(r.timerId);
  var payload={idea_id:state.current.id, verdict:r.verdict, duration_seconds:Math.round((Date.now()-r.runStart)/1000),
    notes:Object.assign({}, r.notes, {per_step_seconds:r.perStep})};
  api('/rest/v1/idea_analyses',{method:'POST',body:JSON.stringify(payload),headers:{Prefer:'return=representation'}})
    .then(function(rows){
      state.analyses.unshift(rows[0]);
      toast('Saved: '+r.verdict.toUpperCase()+' in '+payload.duration_seconds+'s');
      state.run=null; go('detail');
    })
    .catch(function(e){ toast('Save failed: '+e.message); });
}

function statsHtml(){
  var a=state.analyses;
  if(!a.length) return '<div class="empty">No analyses yet. Open an idea and hit Analyze.</div>';
  var avg=Math.round(a.reduce(function(s,x){return s+(x.duration_seconds||0);},0)/a.length);
  var counts={build:0,watch:0,skip:0};
  a.forEach(function(x){ if(counts[x.verdict]!=null) counts[x.verdict]++; });
  var today=new Date().toDateString();
  var todayN=a.filter(function(x){return new Date(x.created_at).toDateString()===today;}).length;
  return '<div class="stat-grid">'
    +'<div class="stat"><div class="n">'+a.length+'</div><div class="l">total analyses</div></div>'
    +'<div class="stat"><div class="n">'+todayN+'</div><div class="l">today</div></div>'
    +'<div class="stat"><div class="n">'+Math.floor(avg/60)+':'+('0'+avg%60).slice(-2)+'</div><div class="l">avg time</div></div>'
    +'<div class="stat"><div class="n" style="color:var(--green)">'+counts.build+'</div><div class="l">build</div></div>'
    +'<div class="stat"><div class="n" style="color:var(--amber)">'+counts.watch+'</div><div class="l">watch</div></div>'
    +'<div class="stat"><div class="n" style="color:var(--red)">'+counts.skip+'</div><div class="l">skip</div></div>'
    +'</div>'
    +'<div style="font-size:13px;color:var(--dim)">Target: 4.5 min per idea. Faster with practice - that is the training.</div>';
}
load();
</script>
</body>
</html>
